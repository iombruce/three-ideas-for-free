<body>
<div id="app"><div id="root"></div></div>
<script>
const CHAPTERS=[
  {key:"what",step:"Chapter 1 of 7",q:"What are you working on?",hint:"Or what's the itch you want to scratch?",bg:"#EEEDFE",ht:"#3C3489",sc:"#534AB7",type:"text",skip:false,icon:'<svg viewBox="0 0 52 52" fill="none"><rect width="52" height="52" rx="12" fill="#AFA9EC"/><path d="M26 14c-6.627 0-12 5.373-12 12 0 3.52 1.52 6.687 3.938 8.89L18 38h16l.062-3.11A11.95 11.95 0 0 0 38 26c0-6.627-5.373-12-12-12z" fill="#3C3489"/><rect x="22" y="37" width="8" height="3" rx="1.5" fill="#26215C"/></svg>'},
  {key:"who",step:"Chapter 2 of 7",q:"Who pays?",hint:"In one sentence: who is this for, and who would actually pay for it?",bg:"#E1F5EE",ht:"#085041",sc:"#0F6E56",type:"text",skip:false,icon:'<svg viewBox="0 0 52 52" fill="none"><rect width="52" height="52" rx="12" fill="#5DCAA5"/><circle cx="26" cy="21" r="7" fill="#085041"/><path d="M13 39c0-7.18 5.82-13 13-13s13 5.82 13 13" stroke="#085041" stroke-width="2.5" stroke-linecap="round" fill="none"/></svg>'},
  {key:"stage",step:"Chapter 3 of 7",q:"Where are you right now?",hint:"Pick the one that fits best",bg:"#FAEEDA",ht:"#633806",sc:"#854F0B",type:"single",skip:false,options:["Just an idea on a napkin","Built something, no users yet","Growing but hitting a ceiling"],icon:'<svg viewBox="0 0 52 52" fill="none"><rect width="52" height="52" rx="12" fill="#EF9F27"/><rect x="13" y="34" width="7" height="8" rx="2" fill="#633806"/><rect x="22" y="26" width="7" height="16" rx="2" fill="#633806"/><rect x="31" y="18" width="7" height="24" rx="2" fill="#633806"/></svg>'},
  {key:"location",step:"Chapter 4 of 7",q:"Where are you based?",hint:"City or country — helps us personalise. Totally optional.",bg:"#E6F1FB",ht:"#0C447C",sc:"#185FA5",type:"text",skip:true,icon:'<svg viewBox="0 0 52 52" fill="none"><rect width="52" height="52" rx="12" fill="#85B7EB"/><circle cx="26" cy="24" r="8" stroke="#0C447C" stroke-width="2.5" fill="none"/><path d="M26 32v6M22 38h8" stroke="#0C447C" stroke-width="2" stroke-linecap="round"/><circle cx="26" cy="24" r="3" fill="#0C447C"/></svg>'},
  {key:"skills",step:"Chapter 5 of 7",q:"What are you already good at?",hint:"Pick everything that applies",bg:"#FBEAF0",ht:"#72243E",sc:"#993556",type:"multi",skip:false,options:["Industry knowledge","Sales / networking","Writing / content","Ops / systems","Teaching / coaching","Technical / no-code"],icon:'<svg viewBox="0 0 52 52" fill="none"><rect width="52" height="52" rx="12" fill="#ED93B1"/><path d="M18 34l8-16 8 16" stroke="#72243E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M21 28h10" stroke="#72243E" stroke-width="2" stroke-linecap="round"/></svg>'},
  {key:"ai",step:"Chapter 6 of 7",q:"Where are you with AI?",hint:"Pick the one that fits",bg:"#EAF3DE",ht:"#27500A",sc:"#3B6D11",type:"single",skip:false,options:["New to it","Use ChatGPT occasionally","Use AI tools weekly","Already automating things"],icon:'<svg viewBox="0 0 52 52" fill="none"><rect width="52" height="52" rx="12" fill="#97C459"/><rect x="15" y="18" width="22" height="16" rx="4" stroke="#27500A" stroke-width="2" fill="none"/><circle cx="21" cy="26" r="2" fill="#27500A"/><circle cx="31" cy="26" r="2" fill="#27500A"/><path d="M22 30c1 1.5 7 1.5 8 0" stroke="#27500A" stroke-width="1.5" stroke-linecap="round" fill="none"/><path d="M20 18v-3M32 18v-3" stroke="#27500A" stroke-width="2" stroke-linecap="round"/></svg>'},
  {key:"budget",step:"Chapter 7 of 7",q:"Budget check",hint:"Which fits your situation right now?",bg:"#FAECE7",ht:"#712B13",sc:"#993C1D",type:"single",skip:false,options:["Literally zero cost only","Happy to spend $5-20/month"],icon:'<svg viewBox="0 0 52 52" fill="none"><rect width="52" height="52" rx="12" fill="#F0997B"/><circle cx="26" cy="26" r="11" stroke="#712B13" stroke-width="2.5" fill="none"/><path d="M26 19v2M26 31v2M22 23.5c0-1.933 1.79-3.5 4-3.5s4 1.567 4 3.5c0 2-2 3-4 3s-4 1.5-4 3.5c0 1.933 1.79 3.5 4 3.5s4-1.567 4-3.5" stroke="#712B13" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>'}
];

const IDEA_LABELS={validate:"Validate your idea",ai_tool:"Your AI tool",grant:"Free money",coaching:"Get real feedback"};
const IDEA_BADGE={validate:"badge-validate",ai_tool:"badge-ai_tool",grant:"badge-grant",coaching:"badge-coaching"};
const IDEA_DOT={validate:"dot-validate",ai_tool:"dot-ai_tool",grant:"dot-grant",coaching:"dot-coaching"};

let qStep=0,ans={},storedP=null,storedB=null,topIdea="",topIdeaWhy="",topIdeaSteps=[],topIdeaIdx=0,selectedChips=[];
const root=document.getElementById("root");
function el(id){return document.getElementById(id);}
function esc(s){return(s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'");}
function progDots(cur,allDone){return '<div class="progress-track">'+CHAPTERS.map((_,i)=>'<div class="prog-dot '+(allDone?"done":i<cur?"done":i===cur?"active":"")+'"></div>').join("")+"</div>";}

function showSplash(){root.innerHTML='<div class="splash"><svg width="64" height="64" viewBox="0 0 64 64" fill="none" style="display:block;margin:0 auto 1.2rem"><rect width="64" height="64" rx="16" fill="#1D9E75"/><path d="M20 44l12-24 12 24" stroke="#E1F5EE" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M24 36h16" stroke="#E1F5EE" stroke-width="2.5" stroke-linecap="round"/><circle cx="44" cy="20" r="6" fill="#5DCAA5"/><path d="M41 20l2 2 4-4" stroke="#04342C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg><h1>What do I do on Monday?</h1><p>Answer 7 quick questions.<br>Get your personalised Monday morning action plan.</p><button class="splash-btn" onclick="startFlow()">Let\'s go</button></div>';}

function showChapter(i){selectedChips=[];const c=CHAPTERS[i];const isText=c.type==="text";const isMulti=c.type==="multi";let bodyHTML="";if(isText){bodyHTML='<div class="chapter-body" style="background:'+c.bg+'"><textarea id="ans" placeholder="Your answer..." rows="2" onkeydown="handleKey(event)"></textarea></div>';}else{const multiHint=isMulti?'<div class="multi-hint" style="background:'+c.bg+'">Select all that apply</div>':"";const chipsHTML=c.options.map(o=>'<button class="chip" onclick="toggleChip(\''+esc(o)+'\','+isMulti+')">'+o+'</button>').join("");bodyHTML=multiHint+'<div class="chips" style="background:'+c.bg+'">'+chipsHTML+'</div>';}root.innerHTML=progDots(i,false)+'<div class="chapter-card"><div class="chapter-header" style="background:'+c.bg+'"><div style="width:52px;height:52px;flex-shrink:0">'+c.icon+'</div><div class="chapter-meta"><div class="chapter-step" style="color:'+c.sc+'">'+c.step+'</div><div class="chapter-q" style="color:'+c.ht+'">'+c.q+'</div><div class="chapter-hint" style="color:'+c.sc+'">'+c.hint+'</div></div></div><div style="background:'+c.bg+'">'+bodyHTML+'</div><div class="chapter-footer" style="background:'+c.bg+'">'+(c.skip?'<button class="skip-link" onclick="skipQ()">Skip</button>':'<span></span>')+(isText||isMulti?'<button class="next-btn" onclick="submitQ()">Next</button>':'<span></span>')+'</div></div>';if(isText){setTimeout(()=>{const t=el("ans");if(t)t.focus();},80);}}

function toggleChip(val,multi){if(!multi){selectedChips=[val];document.querySelectorAll(".chip").forEach(ch=>{ch.classList.toggle("selected",ch.textContent===val);});setTimeout(()=>submitQ(),300);}else{const idx=selectedChips.indexOf(val);if(idx>-1){selectedChips.splice(idx,1);}else{selectedChips.push(val);}document.querySelectorAll(".chip").forEach(ch=>{ch.classList.toggle("selected",selectedChips.includes(ch.textContent));});}}
function handleKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();submitQ();}}
function submitQ(){const c=CHAPTERS[qStep];if(c.type==="text"){const t=el("ans");const v=t?t.value.trim():"";if(!v&&!c.skip)return;ans[c.key]=v||"not provided";}else if(c.type==="single"){if(selectedChips.length===0)return;ans[c.key]=selectedChips[0];}else{if(selectedChips.length===0)return;ans[c.key]=selectedChips.join(", ");}next();}
function skipQ(){ans[CHAPTERS[qStep].key]="not provided";next();}
function next(){qStep++;if(qStep<CHAPTERS.length){showChapter(qStep);}else{showIdeasLoading();genIdeas();}}

function loaderHTML(title,sub,msgs,cls){return progDots(0,true)+'<div class="loading-screen '+cls+'"><div class="loading-title">'+title+'</div><div class="loading-sub">'+sub+'</div><div class="loading-steps">'+msgs.map((m,i)=>'<div class="loading-step" id="ls'+i+'"><span class="step-dot"></span>'+m+'</div>').join("")+'</div><div class="loading-bar-track"><div class="loading-bar-fill" id="lbar"></div></div></div>';}
function animateLoader(msgs,onComplete){let i=0;let done=false;const iv=setInterval(()=>{if(!el("lbar")){clearInterval(iv);return;}msgs.forEach((_,j)=>{const d=el("ls"+j);if(d)d.classList.remove("active-step");});const d=el("ls"+i);if(d)d.classList.add("active-step");const b=el("lbar");if(b)b.style.width=((i+1)/msgs.length*90)+"%";i++;if(i>=msgs.length&&!done){done=true;clearInterval(iv);if(onComplete)setTimeout(onComplete,600);}},900);}

function showIdeasLoading(){const msgs=["Reading your answers...","Mapping your situation...","Finding your grant...","Building your Monday plan..."];root.innerHTML=loaderHTML("Working on your plan","This takes a few seconds — being specific, not generic.",msgs,"ideas-loading");animateLoader(msgs);}
function showBonusLoading(){const msgs=["Locking in on your chosen idea...","Finding the fastest shortcuts...","Picking your next AI tool...","Almost ready..."];root.innerHTML=loaderHTML("Going deeper","Based on your pick: <strong style='color:#fff'>"+topIdea+"</strong>",msgs,"bonus-loading");animateLoader(msgs);}
function showShowtime(type,callback){const isBon=type==="bonus";root.innerHTML=progDots(0,true)+'<div class="showtime-screen '+(isBon?"bonus-show":"ideas-show")+'"><div class="showtime-title">Your plan is ready.</div><div class="showtime-sub">'+(isBon?"Here\'s how to go deeper.":"Here\'s what to do on Monday.")+'</div></div>';setTimeout(callback,1800);}

function buildIdeasPrompt(){const a=ans;return ["You are a direct experienced startup advisor. Return ONLY a single valid JSON object. No markdown. No explanation. No text before or after the JSON.","","Entrepreneur profile:","Working on: "+a.what,"Who pays: "+a.who,"Stage: "+a.stage,"Location: "+(a.location||"not given"),"Skills: "+a.skills,"AI experience: "+a.ai,"Budget: "+a.budget,"","Return a JSON object with exactly these fields:","reinforcement: string","insight: string","ideas: array of exactly 4 objects in this order: validate, ai_tool, grant, coaching. Each has: type, title, why, steps (array of 3 strings). The ai_tool object also has a prompt field.","antiIdea: object with title and why","reads: array of exactly 3 objects with title and why"].join("\n");}

function buildBonusPrompt(why){const a=ans;return ["You are a direct experienced startup advisor. Return ONLY a single valid JSON object. No markdown. No explanation. No text before or after the JSON.","","Chosen idea: "+topIdea,"Why it matters to them: "+why,"Founder profile: "+a.what+" for "+a.who+", stage: "+a.stage+", location: "+(a.location||"not given")+", skills: "+a.skills+", AI experience: "+a.ai+", budget: "+a.budget,"","Return JSON with exactly:","bonusIdeas: array of exactly 3 objects with title, why, steps (array of 3 strings)","futureAI: object with tool, url, why, firstStep","Be specific. No generic advice."].join("\n");}

async function callAPI(prompt,maxTokens,mode){const res=await fetch("/api/ideas",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt,max_tokens:maxTokens,mode:mode||"ideas"})});if(!res.ok)throw new Error("Server error "+res.status);const data=await res.json();const raw=(data.content||data.result||data.text||JSON.stringify(data)).toString().trim();const s=raw.indexOf("{"),e=raw.lastIndexOf("}");if(s===-1||e===-1)throw new Error("No JSON found");return JSON.parse(raw.slice(s,e+1));}

async function genIdeas(){try{const p=await callAPI(buildIdeasPrompt(),2500,"ideas");storedP=p;showShowtime("ideas",()=>showResults(p));}catch(err){root.innerHTML='<div style="margin-top:2rem;background:#fff;border-radius:12px;padding:1.4rem;text-align:center"><h2 style="font-size:1.1rem;color:#1a1a1a;margin-bottom:0.4rem">Something went wrong</h2><p style="font-size:0.88rem;color:#555">'+err.message+'</p><br><button class="splash-btn" onclick="doReset()">Try again</button></div>';}}

function stepsBox(steps){return '<div class="steps-box"><div class="steps-lbl">Monday morning steps</div><ol>'+(steps||[]).map(s=>'<li>'+s+'</li>').join("")+'</ol></div>';}

function ideaCard(idea,i){const type=idea.type||"validate";const label=IDEA_LABELS[type]||"Idea "+(i+1);const badge=IDEA_BADGE[type]||"";const promptHTML=idea.prompt?'<div class="prompt-box"><div class="prompt-lbl">Copy this prompt</div><p>'+idea.prompt+'</p></div>':"";return '<div class="idea-card"><span class="idea-type-badge '+badge+'">'+label+'</span><h3>'+(idea.title||"")+'</h3><p class="why">'+(idea.why||"")+'</p>'+promptHTML+stepsBox(idea.steps)+'</div>';}

function showResults(p){
  const ideas=(p.ideas||[]).map((idea,i)=>ideaCard(idea,i)).join("");
  const rankBtns=(p.ideas||[]).map((idea,i)=>{const type=idea.type||"validate";const label=IDEA_LABELS[type]||"Idea "+(i+1);return '<button class="rank-btn" onclick="pickForBonus(\''+esc(idea.title||"")+'\',\''+esc(idea.why||"")+'\','+i+')"><strong style="display:block;font-size:0.83rem;margin-bottom:2px">'+label+': '+(idea.title||"")+'</strong></button>';}).join("");
  root.innerHTML=progDots(0,true)+'<div class="insight-card"><div class="insight-label">Your situation</div><div class="insight-reinforce">'+(p.reinforcement||"")+'</div><div class="insight-market">'+(p.insight||"")+'</div></div><div class="section-title">Your Monday morning plan</div>'+ideas+'<div class="anti-card"><div class="anti-lbl"><span class="anti-dot"></span>Don\'t waste time on this right now</div><h3>'+((p.antiIdea||{}).title||"")+'</h3><p class="why">'+((p.antiIdea||{}).why||"")+'</p></div><div class="rank-card" id="rank1"><p>Which is most useful to go deeper on?</p>'+rankBtns+'</div><button class="reset-btn" onclick="doReset()">Start over</button>';
  root.scrollIntoView({behavior:"smooth",block:"start"});
}

function pickForBonus(title,why,idx){
  topIdea=title;
  topIdeaWhy=why;
  topIdeaIdx=idx;
  topIdeaSteps=(storedP.ideas||[])[idx]?.steps||[];
  el("rank1").outerHTML='<div class="why-card" id="why-card"><p>Good pick. Why does this one feel most important right now?</p><textarea id="why-txt" placeholder="A sentence or two is fine..." rows="2"></textarea><br><button class="why-submit" onclick="submitWhy()">Go deeper</button></div>';
  setTimeout(()=>{const t=el("why-txt");if(t)t.focus();},80);
}

async function submitWhy(){
  const why=(el("why-txt")||{}).value||"";
  showBonusLoading();
  try{
    const b=await callAPI(buildBonusPrompt(why),2500,"bonus");
    storedB=b;
    showShowtime("bonus",()=>showBonusResults(b));
  }catch(err){
    root.innerHTML='<div style="background:#fff;border-radius:12px;padding:1.4rem;text-align:center"><h2 style="font-size:1.1rem;color:#1a1a1a;margin-bottom:0.4rem">Something went wrong</h2><p style="font-size:0.88rem;color:#555">'+err.message+'</p><button class="reset-btn" onclick="doReset()">Start over</button></div>';
  }
}

function showBonusResults(b){
  const p=storedP;
  const summaryRows=(p.ideas||[]).map(idea=>{const type=idea.type||"validate";const label=IDEA_LABELS[type]||type;const dot=IDEA_DOT[type]||"dot-validate";return '<div class="summary-row"><span class="summary-dot '+dot+'"></span><div><strong>'+label+':</strong> <span>'+(idea.title||"")+'</span></div></div>';}).join("");
  const chosenIdea=(p.ideas||[])[topIdeaIdx]||{};
  const chosenLabel=IDEA_LABELS[chosenIdea.type||"validate"]||"Your pick";
  const bonusCards=(b.bonusIdeas||[]).map((idea,i)=>'<div class="bonus-idea-card"><div class="bonus-idea-num">Deeper dive '+(i+1)+'</div><h3>'+(idea.title||"")+'</h3><p class="why">'+(idea.why||"")+'</p>'+stepsBox(idea.steps)+'</div>').join("");
  const f=b.futureAI||{};
  const futureAIHTML=f.tool?'<div class="future-ai-card"><div class="future-ai-eyebrow">Start learning this next month</div><h3>'+f.tool+'</h3><p class="why">'+f.why+'</p><div class="future-ai-step"><strong>Your first step</strong>'+f.firstStep+'</div>'+(f.url?'<a class="future-ai-url" href="'+f.url+'" target="_blank">→ '+f.url+'</a>':'')+'</div>':"";
  const reads=(p.reads||[]).map(r=>'<div class="read-row"><strong>'+(r.title||"")+'</strong><span>'+(r.why||"")+'</span></div>').join("");
  const mondaySteps=(topIdeaSteps||[]).map((s,i)=>'<div class="monday-step-row"><div class="monday-num">'+(i+1)+'</div><div class="monday-step-text">'+s+'</div></div>').join("");
  root.innerHTML=progDots(0,true)+
    '<div class="summary-card"><div class="summary-label">Your full Monday plan at a glance</div>'+summaryRows+'</div>'+
    '<div class="chosen-card"><div class="chosen-eyebrow">You chose to go deeper on: '+chosenLabel+'</div><h3>'+topIdea+'</h3><p>'+(chosenIdea.why||"")+'</p></div>'+
    '<div class="section-title">Going deeper — 3 ways to accelerate this</div>'+
    bonusCards+
    '<div class="monday-card"><div class="monday-eyebrow">Your Monday morning — first steps</div><h2>'+topIdea+'</h2><div class="monday-chosen">When you sit down on Monday, do these:</div>'+mondaySteps+'</div>'+
    futureAIHTML+
    '<div class="reads-card"><div class="reads-label">📚 Worth reading — when you have time</div>'+reads+'</div>'+
    '<button class="reset-btn" onclick="doReset()">Start over</button>';
  setTimeout(()=>{root.scrollIntoView({behavior:"smooth",block:"start"});},150);
}

function startFlow(){qStep=0;ans={};storedP=null;storedB=null;topIdea="";topIdeaWhy="";topIdeaSteps=[];topIdeaIdx=0;selectedChips=[];showChapter(0);}
function doReset(){qStep=0;ans={};storedP=null;storedB=null;topIdea="";topIdeaWhy="";topIdeaSteps=[];topIdeaIdx=0;selectedChips=[];showSplash();}
showSplash();
</script>
</body>
</html>
